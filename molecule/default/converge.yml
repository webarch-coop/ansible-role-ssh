---
- name: Run as root
  # become: true
  connection: local
  # gather_facts: true
  hosts:
    - localhost
  tasks:

    - name: Debug ansible_facts.effective_user_id
      ansible.builtin.debug:
        var: ansible_facts.effective_user_id

    - name: Debug ansible_facts.user_id
      ansible.builtin.debug:
        var: ansible_facts.user_id

    - name: Debug ansible_facts.user_dir
      ansible.builtin.debug:
        var: ansible_facts.user_dir

    - name: Include ssh role as root for Debian Bookworm, Forky and Trixie and Ubuntu Noble
      ansible.builtin.include_role:
        name: ssh
      vars:  # noqa var-naming[no-role-prefix]
        ssh: true
        ssh_audit: true
        ssh_listen_addresses:
          - "{{ ansible_facts.default_ipv4.address }}"
        ssh_localhost: "{{ ansible_facts.default_ipv4.address }}"
        ssh_audit_local_policy_file: "/usr/local/share/ssh-audit/policies/{{ ansible_facts.distribution_release }}.txt"
      when: ansible_facts.distribution_release is ansible.builtin.regex('^bookworm|forky|noble|trixie$')

    - name: Include ssh role as root for Ubuntu Resolute
      ansible.builtin.include_role:
        name: ssh
      vars:  # noqa var-naming[no-role-prefix]
        ssh: true
        ssh_audit: true
        ssh_listen_addresses:
          - "{{ ansible_facts.default_ipv4.address }}"
        ssh_localhost: "{{ ansible_facts.default_ipv4.address }}"
        ssh_audit_local_policy_file: "/usr/local/share/ssh-audit/policies/{{ ansible_facts.distribution_release }}.txt"
        ssh_kex_algorithms:
          - mlkem768x25519-sha256
          - sntrup761x25519-sha512
          - sntrup761x25519-sha512@openssh.com
          # - ext-info-s
          # - kex-strict-s-v00@openssh.com
        ssh_ciphers:
          - chacha20-poly1305@openssh.com
          - aes256-gcm@openssh.com
          - aes256-ctr
          - aes192-ctr
          - aes128-gcm@openssh.com
          - aes128-ctr
        ssh_macs:
          - hmac-sha2-512-etm@openssh.com
          - hmac-sha2-256-etm@openssh.com
          - umac-128-etm@openssh.com
      when: ansible_facts.distribution_release is ansible.builtin.regex('^resolute$')
...
